<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Pensador Sem Fronteira - LITE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css" id="dark-theme" disabled>
    <link rel="stylesheet" href="css/mobile.css">
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><span>🧠</span>
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('imageUpload').click()"
                    title="Clique para trocar foto | Clique longo para remover">
                    <span>🧠</span>
                </div>
                <input type="file" id="imageUpload" accept="image/*" hidden onchange="UI.updateProfile(event)">
                <span>🧠</span>
                <div class="brand">
                    <span>🧠</span>
                    <h2>Pensador Sem Fronteira</h2>
                    <span class="version">📚 LITE</span>
                </div>
                <button class="mobile-menu-toggle" onclick="UI.toggleSidebar()">☰</button>
            </div>

            <div class="theme-section">
                <h3>🎨 Aparência</h3>
                <button class="theme-toggle-btn" onclick="UI.toggleTheme()">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">Modo Escuro</span>
                </button>
            </div>

            <div class="new-chat-section">
                <button class="new-chat-btn" onclick="Chat.clear()">
                    <span>💬</span> Novo Chat
                </button>
            </div>

            <nav class="knowledge-menu">
                <h3>📚 Biblioteca</h3>
                <div class="nav-buttons" id="navButtons">
                    <!-- Gerado dinamicamente pelo knowledge.js -->
                </div>
            </nav>

            <div class="sidebar-footer">
                <p>Do zero ao Infinito</p>
            </div>
        </aside>

        <!-- OVERLAY MOBILE -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.toggleSidebar()"></div>

        <!-- CHAT PRINCIPAL -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="chat-status">
                    <button class="mobile-menu-btn" onclick="UI.toggleSidebar()">☰</button>
                    <span class="status-dot"></span>
                    <span>📚 Modo Biblioteca (Fallback)</span>
                </div>
                <div class="chat-actions">
                    <button class="action-icon" onclick="Chat.clear()" title="Limpar chat">🗑️</button>
                    <button class="action-icon" onclick="Chat.export()" title="Exportar">📥</button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <div class="welcome-icon">🧠</div>
                    <h2>Pensador Sem Fronteira</h2>
                    <p>Do zero ao Infinito: vamos aprender sobre:</p>
                    <div class="quick-actions" id="quickActions">
                        <!-- Gerado dinamicamente -->
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Digite sua pergunta ou escolha um tópico..."
                        rows="1"></textarea>
                    <button class="send-button" onclick="Chat.send()">🚀</button>
                </div>
                <div class="input-footer">
                    <span>Pressione Enter para enviar</span>
                    <span id="charCount">0/500</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/knowledge.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>
</body>

</html>
